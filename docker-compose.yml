services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: postilys-dev
    ports:
      - "2026:2026"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=2026
      - HOSTNAME=0.0.0.0
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    profiles: ["dev"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: postilys
    ports:
      - "2026:2026"
    environment:
      - NODE_ENV=production
      - PORT=2026
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    profiles: ["prod"]
